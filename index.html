<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта Мест</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --color-bg: #0f0f1a;
            --color-blue: #3390ec;
            --color-olive: #556b2f;
            --color-text: #ffffff;
            --color-panel: #1e1e32;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg); 
            color: var(--color-text); 
            overflow: hidden;
        }
        
        #map { height: 100vh; width: 100vw; }

        .btn {
            position: absolute; z-index: 1000; padding: 12px 18px;
            background: var(--color-panel); color: var(--color-text);
            border: 1px solid #444; border-radius: 12px; 
            font-size: 15px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover { border-color: var(--color-blue); }
        
        #filter-btn { top: 12px; right: 12px; }
        #location-btn { bottom: 20px; left: 12px; }

        #filter-panel {
            position: absolute; top: 64px; right: 12px; z-index: 999;
            background: var(--color-panel);
            padding: 16px; border-radius: 16px; width: 270px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333;
            display: none; max-height: 80vh; overflow-y: auto;
        }
        #filter-panel.active { display: block; }

        .filter-title { font-weight: 600; margin-bottom: 14px; color: var(--color-text); font-size: 16px; }
        
        .search-box {
            width: 100%; padding: 10px 12px; border-radius: 10px;
            border: 1px solid #444; background: #252540; color: var(--color-text);
            font-size: 14px; margin-bottom: 14px;
        }
        .search-box:focus { outline: none; border-color: var(--color-blue); }
        
        .filter-group { margin-bottom: 14px; }
        .filter-group label { 
            display: flex; align-items: center; gap: 10px; 
            padding: 8px 0; font-size: 14px; cursor: pointer; color: #ccc;
        }
        .filter-group label:hover { color: var(--color-text); }
        .filter-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--color-blue); }
        .filter-group select {
            width: 100%; padding: 10px 12px; border-radius: 10px; 
            border: 1px solid #444; background: #252540; color: var(--color-text);
        }

        .btn-action {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            color: white; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 8px;
        }
        .btn-action:active { transform: scale(0.98); }
        .btn-blue { background: var(--color-blue); }

        #loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 15, 26, 0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid #2d2d44;
            border-top-color: var(--color-blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: #aaa; font-size: 15px; }

        .marker-dot {
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        .marker-dot:hover { transform: scale(1.25); }
        
        .m-restaurant { background-color: #2ecc71 !important; }
        .m-cafe { background-color: #95a5a6 !important; }
        .m-coffee { background-color: #d35400 !important; }
        .m-event { background-color: #e74c3c !important; }
        .m-bar { background-color: #f39c12 !important; }
        .m-park { background-color: #1abc9c !important; }
        .m-shop { background-color: #9b59b6 !important; }
        .m-hotel { background-color: #3498db !important; }
        .m-sport { background-color: #e67e22 !important; }
        .m-default { background-color: #7f8c8d !important; }

        .leaflet-popup-content-wrapper {
            background: var(--color-panel); color: var(--color-text); 
            border-radius: 14px; border: 1px solid #333; max-width: 280px;
        }
        .leaflet-popup-tip { background: var(--color-panel); }
        .popup-b { font-weight: 600; font-size: 16px; margin-bottom: 6px; }
        .popup-stars { color: #f1c40f; margin: 4px 0; }
        .popup-desc { color: #ccc; font-size: 14px; margin: 6px 0; line-height: 1.4; }
        
        .popup-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        
        .popup-btn {
            padding: 10px 14px; border-radius: 10px; 
            font-size: 14px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none !important; color: white !important;
            text-align: center;
            transition: opacity 0.2s;
        }
        .popup-btn:active { transform: scale(0.98); }
        .popup-btn.btn-blue { background-color: var(--color-blue) !important; }
        .popup-btn.btn-olive { background-color: var(--color-olive) !important; }
        .popup-btn[href]:hover { opacity: 0.9; }

        #location-toast {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--color-panel); padding: 12px 20px;
            border-radius: 12px; border: 1px solid #444;
            font-size: 13px; text-align: center; z-index: 1000;
            display: none; max-width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #location-toast.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background: var(--color-panel) !important; color: var(--color-text) !important;
            border: 1px solid #444 !important; font-size: 20px !important; font-weight: bold !important;
            width: 40px !important; height: 40px !important; line-height: 40px !important; margin-bottom: 4px !important;
        }
        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover {
            background: #2d2d44 !important; border-color: var(--color-blue) !important;
        }
        .leaflet-bar { border: none !important; border-radius: 12px !important; overflow: hidden !important; }
        .leaflet-bar a:first-child { border-radius: 12px 12px 0 0 !important; }
        .leaflet-bar a:last-child { border-radius: 0 0 12px 12px !important; margin-bottom: 0 !important; }

        @media (max-width: 480px) {
            .btn { padding: 10px 14px; font-size: 14px; }
            #filter-panel { width: calc(100% - 24px); right: 12px; }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Загружаем места...</div>
    </div>

    <button id="location-btn" class="btn" onclick="showMyLocation()">📍 Моё место</button>
    <button id="filter-btn" class="btn" onclick="toggleFilters()">⚙ Фильтры</button>

    <div id="filter-panel">
        <div class="filter-title">🔍 Фильтры</div>
        
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Поиск по названию..." oninput="applyFilters()">
        
        <div class="filter-group" id="types-filter">
            <label>Тип места:</label>
        </div>
        
        <div class="filter-group">
            <label>Мин. звёзды:</label>
            <select id="stars-select" onchange="applyFilters()">
                <option value="0">Любые</option>
                <option value="3">3+</option>
                <option value="4">4+</option>
                <option value="5">Только 5</option>
            </select>
        </div>
        <button class="btn-action btn-blue" onclick="resetFilters()">🔄 Сбросить</button>
    </div>

    <div id="location-toast"></div>
    <div id="map"></div>

    <script>
        // =====================================================================
        // ⚙️ НАСТРОЙКИ ТИПОВ МЕСТ (РЕДАКТИРОВАТЬ ЗДЕСЬ)
        // =====================================================================
        
        const ENABLED_TYPES = [
            'Ресторан',
            'Кафе',
            'Кофейня',
            'Бар',
            'Мероприятие',
            'Парк',
            'Магазин',
            'Отель',
            'Спорт'
        ];

        const TYPE_COLORS = {
            'ресторан': 'm-restaurant',
            'кафе': 'm-cafe',
            'кофейня': 'm-coffee',
            'бар': 'm-bar',
            'мероприятие': 'm-event',
            'парк': 'm-park',
            'магазин': 'm-shop',
            'отель': 'm-hotel',
            'спорт': 'm-sport'
        };

        // =====================================================================
        // 📍 КАРТА И ДАННЫЕ
        // =====================================================================
        
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUUBwrpxYhsqeh8Jh6CR5KSQUfFNuBi7WVYTOYur0DsFyEuQARkc_6s7YGouXzhCvJoc63iWrSKvsU/pub?gid=1209047843&single=true&output=csv';
        const CENTER = [56.8389, 60.6057];
        const DEFAULT_ZOOM = 12;

        const map = L.map('map').setView(CENTER, DEFAULT_ZOOM);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let allMarkers = [];
        let userMarker = null;

        function normalize(str) {
            return (str || '').toString().trim().toLowerCase();
        }

        function getMarkerClass(type) {
            const t = normalize(type);
            if (TYPE_COLORS[t]) {
                return TYPE_COLORS[t];
            }
            for (const [key, color] of Object.entries(TYPE_COLORS)) {
                if (t.includes(key)) {
                    return color;
                }
            }
            return 'm-default';
        }

        function createIcon(colorClass, stars) {
            return L.divIcon({
                className: `marker-dot ${colorClass}`,
                html: stars >= 5 ? '★' : '',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
        }

        function getYandexRouteLink(lat, lng) {
            return `https://yandex.ru/maps/?rtext=~${lat},${lng}`;
        }

        function renderTypeFilters(types) {
            const container = document.getElementById('types-filter');
            container.innerHTML = '<label>Тип места:</label>';
            
            types.forEach(type => {
                const label = document.createElement('label');
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = type;
                checkbox.checked = true;
                checkbox.onchange = applyFilters;
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(' ' + type));
                container.appendChild(label);
            });
        }

        function showMyLocation() {
            const toast = document.getElementById('location-toast');
            if (!navigator.geolocation) {
                toast.textContent = '❌ Геолокация не поддерживается';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 5000);
                return;
            }

            toast.textContent = '📍 Определяем...';
            toast.classList.add('show');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    if (userMarker) map.removeLayer(userMarker);
                    
                    userMarker = L.marker([lat, lng], {
                        icon: L.divIcon({
                            className: 'marker-dot',
                            html: '📍',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        })
                    }).addTo(map);
                    
                    map.flyTo([lat, lng], 15);
                    toast.textContent = `✅ Вы здесь: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    setTimeout(() => toast.classList.remove('show'), 5000);
                },
                (error) => {
                    toast.textContent = '❌ Не удалось определить';
                    setTimeout(() => toast.classList.remove('show'), 5000);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function loadData() {
            fetch(SHEET_URL)
                .then(response => response.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: h => normalize(h),
                        complete: function(results) {
                            processResults(results.data);
                        },
                        error: function(err) {
                            document.querySelector('.loader-text').textContent = 'Ошибка загрузки';
                        }
                    });
                })
                .catch(() => {
                    document.querySelector('.loader-text').textContent = 'Ошибка подключения';
                });
        }

        function processResults(data) {
            const typesSet = new Set();
            
            data.forEach(row => {
                const type = row['тип'];
                if (type && type !== '-' && type.trim() !== '') {
                    typesSet.add(type.trim());
                }
            });
            
            const availableTypes = Array.from(typesSet).filter(t => {
                const normalized = normalize(t);
                return ENABLED_TYPES.some(enabled => normalize(enabled) === normalized);
            }).sort();
            
            renderTypeFilters(availableTypes);
            
            let added = 0;
            data.forEach(row => {
                const name = row['название'] || row['тип'] || 'Без названия';
                const type = row['тип'] || 'Другое';
                const stars = parseInt(row['звезды'] || '0');
                const lat = parseFloat(row['широта']);
                const lng = parseFloat(row['долгота']);
                
                if (isNaN(lat) || isNaN(lng)) return;

                const colorClass = getMarkerClass(type);
                const marker = L.marker([lat, lng], { icon: createIcon(colorClass, stars) });

                const linkHtml = row['ссылка'] ? 
                    `<a href="${row['ссылка']}" target="_blank" class="popup-btn btn-olive">🔗 Пост</a>` : '';

                const popup = `
                    <div>
                        <div class="popup-b">${name}</div>
                        <div class="popup-stars">${'⭐'.repeat(stars)}</div>
                        <div class="popup-desc">${row['описание'] || ''}</div>
                        <div class="popup-actions">
                            <a href="${getYandexRouteLink(lat, lng)}" target="_blank" class="popup-btn btn-blue">🗺 Маршрут</a>
                            ${linkHtml}
                        </div>
                    </div>
                `;
                marker.bindPopup(popup);
                
                marker.meta = { 
                    type: normalize(type),
                    originalType: type.trim(),
                    stars: stars,
                    name: normalize(name),
                    originalName: name
                };
                allMarkers.push(marker);
                marker.addTo(map);
                added++;
            });

            document.getElementById('loader').classList.add('hidden');
            console.log('✅ Загружено мест:', added);
            console.log('✅ Типы:', availableTypes);
        }

        function toggleFilters() {
            document.getElementById('filter-panel').classList.toggle('active');
        }

        // ⚠️ ИСПРАВЛЕННАЯ ФУНКЦИЯ ФИЛЬТРАЦИИ
        function applyFilters() {
            // Получаем ТОЛЬКО отмеченные чекбоксы
            const checkboxes = document.querySelectorAll('#types-filter input[type="checkbox"]:checked');
            const selectedTypes = Array.from(checkboxes).map(cb => normalize(cb.value));
            
            const minStars = parseInt(document.getElementById('stars-select').value);
            const searchText = normalize(document.getElementById('search-input').value);

            // Скрываем ВСЕ маркеры сначала
            allMarkers.forEach(m => map.removeLayer(m));
            
            // Показываем только подходящие
            allMarkers.forEach(marker => {
                // ⚠️ ИСПРАВЛЕНИЕ: если нет выбранных типов - НЕ показываем ничего
                const typeMatch = selectedTypes.length > 0 && 
                                  selectedTypes.some(t => marker.meta.originalType.toLowerCase() === t);
                
                const starMatch = marker.meta.stars >= minStars;
                
                const searchMatch = searchText === '' || 
                                    marker.meta.originalName.toLowerCase().includes(searchText);
                
                // Показываем только если ВСЕ условия совпали
                if (typeMatch && starMatch && searchMatch) {
                    marker.addTo(map);
                }
            });
            
            console.log('🔍 Фильтр: типов выбрано =', selectedTypes.length, '| Показано =', 
                allMarkers.filter(m => m._map).length);
        }

        function resetFilters() {
            document.querySelectorAll('#types-filter input[type="checkbox"]').forEach(cb => cb.checked = true);
            document.getElementById('stars-select').value = '0';
            document.getElementById('search-input').value = '';
            applyFilters();
        }

        map.on('click', () => document.getElementById('filter-panel').classList.remove('active'));
        loadData();
        
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
