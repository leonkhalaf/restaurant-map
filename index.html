<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта Мест</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a; color: #fff; overflow: hidden;
        }
        #map { height: 100vh; width: 100vw; }

        /* Кнопки */
        .btn {
            position: absolute; z-index: 1000; right: 12px; padding: 12px 18px;
            background: linear-gradient(135deg, #2d2d44, #1a1a2e); color: #fff;
            border: 1px solid #444; border-radius: 12px; font-size: 15px; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover { border-color: #3390ec; }
        #filter-btn { top: 12px; }

        /* Панель фильтров */
        #filter-panel {
            position: absolute; top: 64px; right: 12px; z-index: 999;
            background: linear-gradient(135deg, #1e1e32, #151525);
            padding: 16px; border-radius: 16px; width: 270px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333;
            display: none; animation: slideIn 0.2s ease;
        }
        #filter-panel.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .filter-title { font-weight: 600; margin-bottom: 14px; color: #fff; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .filter-group { margin-bottom: 14px; }
        .filter-group label { 
            display: flex; align-items: center; gap: 10px; padding: 8px 0; 
            font-size: 14px; cursor: pointer; color: #ccc; transition: color 0.2s;
        }
        .filter-group label:hover { color: #fff; }
        .filter-group input[type="checkbox"] { 
            width: 18px; height: 18px; accent-color: #3390ec; cursor: pointer; 
        }
        .filter-group select {
            width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #444;
            background: #252540; color: #fff; font-size: 14px; margin-top: 6px;
        }
        .apply-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #3390ec, #2578c9);
            color: white; font-weight: 600; font-size: 15px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .apply-btn:active { transform: scale(0.98); }
        .apply-btn:hover { box-shadow: 0 4px 16px rgba(51, 144, 236, 0.4); }

        /* Лоадер */
        #loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 15, 26, 0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; transition: opacity 0.3s;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid #2d2d44;
            border-top-color: #3390ec; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: #aaa; font-size: 15px; }

        /* Маркеры */
        .marker-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; transition: transform 0.2s;
        }
        .marker-dot:hover { transform: scale(1.25); }
        .m-restaurant { background: #2ecc71; }
        .m-event { background: #e74c3c; }
        .m-cafe { background: #95a5a6; }

        /* Попап */
        .leaflet-popup-content-wrapper {
            background: #1e1e32; color: #fff; border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333;
        }
        .leaflet-popup-tip { background: #1e1e32; }
        .popup-b { font-weight: 600; font-size: 16px; margin-bottom: 6px; color: #fff; }
        .popup-stars { color: #f1c40f; margin: 4px 0; font-size: 14px; }
        .popup-desc { color: #ccc; font-size: 14px; margin: 6px 0; line-height: 1.4; }
        .popup-link { 
            color: #3390ec; text-decoration: none; font-weight: 500; font-size: 14px;
            display: inline-flex; align-items: center; gap: 4px; margin-top: 8px;
        }
        .popup-link:active { opacity: 0.8; }

        /* Адаптив */
        @media (max-width: 480px) {
            .btn { padding: 10px 14px; font-size: 14px; }
            #filter-panel { width: calc(100% - 24px); right: 12px; max-height: 70vh; overflow-y: auto; }
        }
    </style>
</head>
<body>
    <!-- Лоадер -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Загружаем места...</div>
    </div>

    <!-- Кнопки -->
    <button id="filter-btn" class="btn" onclick="toggleFilters()">⚙ Фильтры</button>

    <!-- Фильтры -->
    <div id="filter-panel">
        <div class="filter-title">🔍 Фильтры</div>
        <div class="filter-group">
            <label><input type="checkbox" value="Ресторан" checked> Ресторан</label>
            <label><input type="checkbox" value="Кафе" checked> Кафе</label>
            <label><input type="checkbox" value="Мероприятие" checked> Мероприятие</label>
        </div>
        <div class="filter-group">
            <label>Мин. звёзды:</label>
            <select id="stars-select">
                <option value="0">Любые</option>
                <option value="3">3+</option>
                <option value="4">4+</option>
                <option value="5">Только 5</option>
            </select>
        </div>
        <button class="apply-btn" onclick="applyFilters()">Применить</button>
    </div>

    <!-- Карта -->
    <div id="map"></div>

    <script>
        // ================= КОНФИГ =================
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUUBwrpxYhsqeh8Jh6CR5KSQUfFNuBi7WVYTOYur0DsFyEuQARkc_6s7YGouXzhCvJoc63iWrSKvsU/pub?output=csv';
        const CENTER = [56.8389, 60.6057]; // Екатеринбург
        const DEFAULT_ZOOM = 12;
        // ===========================================

        // Инициализация карты
        const map = L.map('map').setView(CENTER, DEFAULT_ZOOM);
        
        // Тёмные тайлы (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let allMarkers = [];

        // Нормализация заголовков
        function normalize(str) {
            return (str || '').toString().trim().toLowerCase();
        }

        // Цвет маркера по типу
        function getMarkerClass(type) {
            const t = normalize(type);
            if (t.includes('ресторан')) return 'm-restaurant';
            if (t.includes('мероприятие')) return 'm-event';
            if (t.includes('кафе')) return 'm-cafe';
            return 'm-cafe';
        }

        // Иконка маркера
        function createIcon(colorClass, stars) {
            return L.divIcon({
                className: `marker-dot ${colorClass}`,
                html: stars >= 4 ? '★' : '',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
        }

        // Загрузка данных
        function loadData() {
            fetch(SHEET_URL)
                .then(response => response.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: h => normalize(h),
                        complete: function(results) {
                            processResults(results.data);
                        },
                        error: function(err) {
                            console.error('Ошибка парсинга:', err);
                            document.querySelector('.loader-text').textContent = 'Ошибка загрузки данных';
                        }
                    });
                })
                .catch(err => {
                    console.error('Ошибка fetch:', err);
                    document.querySelector('.loader-text').textContent = 'Ошибка подключения';
                });
        }

        // Обработка данных
        function processResults(data) {
            let added = 0;
            
            data.forEach(row => {
                const lat = parseFloat(row['широта']);
                const lng = parseFloat(row['долгота']);
                
                if (isNaN(lat) || isNaN(lng)) return;

                const type = row['тип'] || 'Другое';
                const stars = parseInt(row['звезды']) || 0;
                const colorClass = getMarkerClass(type);
                
                const marker = L.marker([lat, lng], {
                    icon: createIcon(colorClass, stars)
                });

                const popup = `
                    <div>
                        <div class="popup-b">${type}</div>
                        <div class="popup-stars">${'⭐'.repeat(stars)}</div>
                        <div class="popup-desc">${row['описание'] || ''}</div>
                        ${row['ссылка'] ? `<a href="${row['ссылка']}" target="_blank" class="popup-link">🔗 Пост</a>` : ''}
                    </div>
                `;
                marker.bindPopup(popup);
                marker.meta = { type: normalize(type), stars: stars, originalType: type };
                
                allMarkers.push(marker);
                marker.addTo(map);
                added++;
            });

            // Скрываем лоадер
            document.getElementById('loader').classList.add('hidden');
            console.log('✅ Загружено мест:', added);
        }

        // Фильтры
        function toggleFilters() {
            document.getElementById('filter-panel').classList.toggle('active');
        }

        function applyFilters() {
            document.getElementById('filter-panel').classList.remove('active');
            
            const checkedTypes = Array.from(document.querySelectorAll('#filter-panel input[type="checkbox"]:checked'))
                .map(cb => normalize(cb.value));
            const minStars = parseInt(document.getElementById('stars-select').value);

            allMarkers.forEach(m => map.removeLayer(m));
            
            allMarkers.forEach(marker => {
                const typeMatch = checkedTypes.some(t => marker.meta.type.includes(t));
                const starMatch = marker.meta.stars >= minStars;
                
                if (typeMatch && starMatch) {
                    marker.addTo(map);
                }
            });
        }

        // Закрытие фильтров при клике на карту
        map.on('click', () => {
            document.getElementById('filter-panel').classList.remove('active');
        });

        // Инициализация
        loadData();
        
        // Telegram WebApp
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
