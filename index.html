<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта Мест</title>
    
    <!-- Карта Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Парсер CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* ================= ЦВЕТА (3 основных) ================= */
        :root {
            --color-bg: #0f0f1a;        /* Фон (тёмный) */
            --color-blue: #3390ec;      /* Синий (кнопки, акценты) */
            --color-olive: #556b2f;     /* Оливковый (кнопки) */
            --color-text: #ffffff;      /* Текст */
            --color-panel: #1e1e32;     /* Панели */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg); 
            color: var(--color-text); 
            overflow: hidden;
        }
        
        #map { height: 100vh; width: 100vw; }

        /* ================= КНОПКИ ================= */
        .btn {
            position: absolute; z-index: 1000; padding: 12px 18px;
            background: var(--color-panel); color: var(--color-text);
            border: 1px solid #444; border-radius: 12px; 
            font-size: 15px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover { border-color: var(--color-blue); }
        
        #filter-btn { top: 12px; right: 12px; }
        #location-btn { top: 12px; left: 12px; }
        #add-btn { bottom: 20px; right: 12px; background: var(--color-olive); }

        /* ================= ПАНЕЛЬ ФИЛЬТРОВ ================= */
        #filter-panel {
            position: absolute; top: 64px; right: 12px; z-index: 999;
            background: var(--color-panel);
            padding: 16px; border-radius: 16px; width: 270px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333;
            display: none; max-height: 80vh; overflow-y: auto;
        }
        #filter-panel.active { display: block; }

        .filter-title { 
            font-weight: 600; margin-bottom: 14px; 
            color: var(--color-text); font-size: 16px; 
        }
        
        .filter-group { margin-bottom: 14px; }
        
        .filter-group label { 
            display: flex; align-items: center; gap: 10px; 
            padding: 8px 0; font-size: 14px; cursor: pointer; 
            color: #ccc; transition: color 0.2s;
        }
        .filter-group label:hover { color: var(--color-text); }
        
        .filter-group input[type="checkbox"] { 
            width: 18px; height: 18px; 
            accent-color: var(--color-blue); cursor: pointer; 
        }

        .filter-group select {
            width: 100%; padding: 10px 12px; border-radius: 10px; 
            border: 1px solid #444; background: #252540; 
            color: var(--color-text); font-size: 14px; margin-top: 6px;
        }

        /* ================= КНОПКИ ДЕЙСТВИЙ ================= */
        .btn-action {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            color: white; font-weight: 600; font-size: 15px; 
            cursor: pointer; margin-top: 8px; text-decoration: none;
            display: inline-block; text-align: center;
        }
        .btn-action:active { transform: scale(0.98); }
        .btn-blue { background: var(--color-blue); }
        .btn-olive { background: var(--color-olive); }

        /* ================= ЛОАДЕР ================= */
        #loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 15, 26, 0.95); z-index: 2000;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 20px;
            transition: opacity 0.3s;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        
        .spinner {
            width: 50px; height: 50px; border: 4px solid #2d2d44;
            border-top-color: var(--color-blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loader-text { color: #aaa; font-size: 15px; }

        /* ================= МАРКЕРЫ ================= */
        .marker-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; transition: transform 0.2s;
        }
        .marker-dot:hover { transform: scale(1.25); }
        
        .m-restaurant { background: #2ecc71; }  /* Зелёный */
        .m-event { background: #e74c3c; }       /* Красный */
        .m-cafe { background: #95a5a6; }        /* Серый */

        /* ================= ПОПАП ================= */
        .leaflet-popup-content-wrapper {
            background: var(--color-panel); color: var(--color-text); 
            border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            border: 1px solid #333; max-width: 280px;
        }
        .leaflet-popup-tip { background: var(--color-panel); }
        
        .popup-b { font-weight: 600; font-size: 16px; margin-bottom: 6px; }
        .popup-stars { color: #f1c40f; margin: 4px 0; font-size: 14px; }
        .popup-desc { color: #ccc; font-size: 14px; margin: 6px 0; line-height: 1.4; }
        
        .popup-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        
        .popup-btn {
            padding: 10px 14px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none; transition: transform 0.2s;
        }
        .popup-btn:active { transform: scale(0.98); }

        /* ================= УВЕДОМЛЕНИЕ О КООРДИНАТАХ ================= */
        #location-toast {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--color-panel); padding: 12px 20px;
            border-radius: 12px; border: 1px solid #444;
            font-size: 13px; text-align: center; z-index: 1000;
            display: none; max-width: 90%;
        }
        #location-toast.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* Адаптив для мобильных */
        @media (max-width: 480px) {
            .btn { padding: 10px 14px; font-size: 14px; }
            #filter-panel { width: calc(100% - 24px); right: 12px; }
        }
    </style>
</head>
<body>
    <!-- Лоадер -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Загружаем места...</div>
    </div>

    <!-- Кнопки -->
    <button id="location-btn" class="btn" onclick="showMyLocation()">📍 Моё место</button>
    <button id="filter-btn" class="btn" onclick="toggleFilters()">⚙ Фильтры</button>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdFQiqVRBCLUlgUuh29VOPWHninYGJnIV4B3p7uNR1wN4p5xw/viewform" target="_blank" id="add-btn" class="btn">➕ Добавить место</a>

    <!-- Панель фильтров -->
    <div id="filter-panel">
        <div class="filter-title">🔍 Фильтры</div>
        
        <!-- 
        ═══════════════════════════════════════════════════
        📝 КАК ДОБАВИТЬ НОВЫЙ ТИП МЕСТА В ФИЛЬТРЫ:
        1. Скопируйте строку с label
        2. Замените value и текст на ваш тип (например, "Бар")
        3. В Google Таблице используйте точно такое же название
        4. В JS (getMarkerClass) добавьте цвет для нового типа
        ═══════════════════════════════════════════════════
        -->
        <div class="filter-group">
            <label>Тип места:</label>
            <label><input type="checkbox" value="Ресторан" checked onchange="applyFilters()"> Ресторан</label>
            <label><input type="checkbox" value="Кафе" checked onchange="applyFilters()"> Кафе</label>
            <label><input type="checkbox" value="Мероприятие" checked onchange="applyFilters()"> Мероприятие</label>
        </div>
        
        <div class="filter-group">
            <label>Мин. звёзды:</label>
            <select id="stars-select" onchange="applyFilters()">
                <option value="0">Любые</option>
                <option value="3">3+</option>
                <option value="4">4+</option>
                <option value="5">Только 5</option>
            </select>
        </div>
        
        <button class="btn-action btn-blue" onclick="resetFilters()">🔄 Сбросить фильтры</button>
    </div>

    <!-- Уведомление о координатах -->
    <div id="location-toast"></div>

    <!-- Карта -->
    <div id="map"></div>

    <script>
        // ================= НАСТРОЙКИ =================
        
        // ⚠️ ССЫЛКА НА ВАШУ GOOGLE ТАБЛИЦУ (CSV) - Лист 2
        // Важно: опубликуйте именно "Лист 2" в формате CSV
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUUBwrpxYhsqeh8Jh6CR5KSQUfFNuBi7WVYTOYur0DsFyEuQARkc_6s7YGouXzhCvJoc63iWrSKvsU/pub?output=csv';
        
        // Центр карты (Екатеринбург)
        const CENTER = [56.8389, 60.6057];
        const DEFAULT_ZOOM = 12;
        
        // =============================================

        // Инициализация карты
        const map = L.map('map').setView(CENTER, DEFAULT_ZOOM);
        
        // Тёмная тема карты (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let allMarkers = [];
        let userMarker = null;

        // Нормализация текста
        function normalize(str) {
            return (str || '').toString().trim().toLowerCase();
        }

        /* 
        ═══════════════════════════════════════════════════
        🎨 КАК ДОБАВИТЬ ЦВЕТ ДЛЯ НОВОГО ТИПА МЕСТА:
        1. Добавьте условие в функцию ниже
        2. Пример: if (t.includes('бар')) return 'm-bar';
        3. Добавьте CSS класс .m-bar { background: #цвет; }
        ═══════════════════════════════════════════════════
        */
        function getMarkerClass(type) {
            const t = normalize(type);
            if (t.includes('ресторан')) return 'm-restaurant';
            if (t.includes('мероприятие')) return 'm-event';
            if (t.includes('кафе')) return 'm-cafe';
            return 'm-cafe'; // Цвет по умолчанию
        }

        // Создание иконки маркера
        function createIcon(colorClass, stars) {
            return L.divIcon({
                className: `marker-dot ${colorClass}`,
                html: stars >= 4 ? '★' : '',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
        }

        // Генерация ссылки Google Maps (маршрут)
        function getGoogleMapsLink(lat, lng) {
            return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
        }

        // Показать моё местоположение
        function showMyLocation() {
            const toast = document.getElementById('location-toast');
            
            if (!navigator.geolocation) {
                toast.textContent = '❌ Геолокация не поддерживается браузером';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
                return;
            }

            toast.textContent = '📍 Определяем местоположение...';
            toast.classList.add('show');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // Удаляем старый маркер
                    if (userMarker) {
                        map.removeLayer(userMarker);
                    }
                    
                    // Добавляем маркер пользователя
                    userMarker = L.marker([lat, lng], {
                        icon: L.divIcon({
                            className: 'marker-dot',
                            html: '📍',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        })
                    }).addTo(map);
                    
                    // Центрируем карту
                    map.flyTo([lat, lng], 15);
                    
                    toast.textContent = `✅ Вы здесь: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    setTimeout(() => toast.classList.remove('show'), 4000);
                },
                (error) => {
                    toast.textContent = '❌ Не удалось определить местоположение';
                    setTimeout(() => toast.classList.remove('show'), 3000);
                    console.error('Geolocation error:', error);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Загрузка данных из Google Таблицы
        function loadData() {
            fetch(SHEET_URL)
                .then(response => response.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: h => normalize(h),
                        complete: function(results) {
                            processResults(results.data);
                        },
                        error: function(err) {
                            console.error('Ошибка парсинга:', err);
                            document.querySelector('.loader-text').textContent = 'Ошибка загрузки данных';
                        }
                    });
                })
                .catch(err => {
                    console.error('Ошибка fetch:', err);
                    document.querySelector('.loader-text').textContent = 'Ошибка подключения';
                });
        }

        // Обработка данных
        function processResults(data) {
            let added = 0;
            
            data.forEach(row => {
                // ⚠️ Пропускаем первую колонку (время) - берём со 2-й колонки
                // Предполагаемая структура: Время | Тип | Звезды | Широта | Долгота | Описание | Ссылка
                const type = row['тип'] || row['2'] || 'Другое';
                const stars = parseInt(row['звезды'] || row['3'] || '0');
                const lat = parseFloat(row['широта'] || row['4']);
                const lng = parseFloat(row['долгота'] || row['5']);
                
                if (isNaN(lat) || isNaN(lng)) return;

                const colorClass = getMarkerClass(type);
                
                const marker = L.marker([lat, lng], {
                    icon: createIcon(colorClass, stars)
                });

                const popup = `
                    <div>
                        <div class="popup-b">${type}</div>
                        <div class="popup-stars">${'⭐'.repeat(stars)}</div>
                        <div class="popup-desc">${row['описание'] || row['6'] || ''}</div>
                        <div class="popup-actions">
                            <a href="${getGoogleMapsLink(lat, lng)}" target="_blank" class="popup-btn btn-blue">
                                🗺 Маршрут
                            </a>
                            ${row['ссылка'] || row['7'] ? `
                            <a href="${row['ссылка'] || row['7']}" target="_blank" class="popup-btn btn-olive">
                                🔗 Пост
                            </a>` : ''}
                        </div>
                    </div>
                `;
                marker.bindPopup(popup);
                
                marker.meta = { type: normalize(type), stars: stars, originalType: type };
                allMarkers.push(marker);
                marker.addTo(map);
                added++;
            });

            document.getElementById('loader').classList.add('hidden');
            console.log('✅ Загружено мест:', added);
        }

        // Фильтры
        function toggleFilters() {
            document.getElementById('filter-panel').classList.toggle('active');
        }

        function applyFilters() {
            const checkedTypes = Array.from(
                document.querySelectorAll('#filter-panel input[type="checkbox"]:checked')
            ).map(cb => normalize(cb.value));
            
            const minStars = parseInt(document.getElementById('stars-select').value);

            allMarkers.forEach(m => map.removeLayer(m));
            
            allMarkers.forEach(marker => {
                const typeMatch = checkedTypes.some(t => marker.meta.type.includes(t));
                const starMatch = marker.meta.stars >= minStars;
                
                if (typeMatch && starMatch) {
                    marker.addTo(map);
                }
            });
        }

        function resetFilters() {
            document.querySelectorAll('#filter-panel input[type="checkbox"]').forEach(cb => cb.checked = true);
            document.getElementById('stars-select').value = '0';
            applyFilters();
        }

        map.on('click', () => {
            document.getElementById('filter-panel').classList.remove('active');
        });

        // Загрузка
        loadData();
        
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
